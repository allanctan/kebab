# KEBAB model registry — operator-editable alias map.
#
# Pattern adapted from better-ed-ai/app/config/models.yaml. The point of a
# YAML file (vs. a hardcoded dict in Python) is **lazy env expansion**: any
# `${VAR}` reference is resolved only when an alias is actually used, so
# adding a Bedrock or Azure alias never breaks startup just because the
# corresponding credential is missing.
#
# Provider types:
#   google-gla    → native pydantic-ai pass-through (Gemini)
#   openai        → native pydantic-ai pass-through (OpenAI)
#   anthropic     → native pydantic-ai pass-through (Anthropic)
#   openai-compat → OpenAIProvider with custom base_url (Azure, MiniMax, etc.)
#   bedrock       → BedrockConverseModel (AWS credentials from Settings)
#
# To add an alias: append a new entry. No code changes required.

models:
  # ---------- Google Gemini ----------
  - alias: gemini-flash
    provider: google-gla
    model: gemini-2.5-flash

  - alias: gemini-flash-lite
    provider: google-gla
    model: gemini-2.5-flash-lite

  - alias: gemini-pro
    provider: google-gla
    model: gemini-2.5-pro

  # ---------- Azure OpenAI ----------
  - alias: gpt-5.4-mini
    provider: openai-compat
    model: gpt-5.4-mini
    endpoint: ${AZURE_OPENAI_ENDPOINT}openai/v1/
    api_key: ${AZURE_OPENAI_API_KEY}

  # ---------- AWS Bedrock (Anthropic) ----------
  - alias: sonnet-4.6
    provider: bedrock
    model: us.anthropic.claude-sonnet-4-6

  - alias: haiku-4.5
    provider: bedrock
    model: us.anthropic.claude-haiku-4-5-20251001-v1:0

  # ---------- MiniMax ----------
  - alias: minimax
    provider: openai-compat
    model: MiniMax-M2.7-highspeed
    endpoint: ${MINIMAX_BASE_URL}
    api_key: ${MINIMAX_API_KEY}
